- hosts: web
  become: yes
  tasks:

    - name: Ensure project directory exists
      file:
        path: /var/www/restaurant
        state: directory
        mode: '0755'

    - name: Pull latest code
      git:
        repo: https://github.com/RMR0304/Restaurant-Management-System.git
        dest: /var/www/restaurant
        version: master
        force: yes

    - name: Sync files to nginx root
      synchronize:
        src: /var/www/restaurant/
        dest: /var/www/html/
        recursive: yes
        delete: yes

    - name: Restart nginx
      service:
        name: nginx
        state: restarted
